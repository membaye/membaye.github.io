<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/custom.css' | relative_url }}">
</head>
<body>
    <header>
        <h1>{{ site.title }}</h1>
        <nav>
            <ul>
                <li><a href="{{ '/' | relative_url }}">Home</a></li>
                <li><a href="#" id="resume-button">Resume</a></li>
                <li><a href="#" id="contact-button">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        {{ content }}
    </main>
    <footer>
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </footer>

    <div id="resume-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <iframe src="{{ '/assets/resume.pdf' | relative_url }}" width="100%" height="600px">
                This browser does not support PDFs. Please download the PDF to view it: <a href="{{ '/assets/resume.pdf' | relative_url }}">Download Resume</a>.
            </iframe>
        </div>
    </div>

    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Contact Me</h2>
            <ul>
                <li><a href="https://github.com/membaye" target="_blank">GitHub</a></li>
                <li><a href="https://www.linkedin.com/in/matthewembaye/" target="_blank">LinkedIn</a></li>
            </ul>
        </div>
    </div>

    <script>
        // JavaScript to handle the modals
        const resumeButton = document.getElementById('resume-button');
        const contactButton = document.getElementById('contact-button');
        const resumeModal = document.getElementById('resume-modal');
        const contactModal = document.getElementById('contact-modal');
        const closeButtons = document.getElementsByClassName('close');

        resumeButton.onclick = function() {
            resumeModal.style.display = 'block';
        }

        contactButton.onclick = function() {
            contactModal.style.display = 'block';
        }

        for (let i = 0; i < closeButtons.length; i++) {
            closeButtons[i].onclick = function() {
                resumeModal.style.display = 'none';
                contactModal.style.display = 'none';
            }
        }

        window.onclick = function(event) {
            if (event.target == resumeModal || event.target == contactModal) {
                resumeModal.style.display = 'none';
                contactModal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
