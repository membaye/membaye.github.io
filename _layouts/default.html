---
layout: default
---

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
    <title>{{ page.title }}</title>
</head>
<body>

<header>
    <h1>{{ site.title }}</h1>
    <nav>
        <ul>
            <li><a href="{{ site.baseurl }}/">Home</a></li>
            <li><a id="resume-button" href="javascript:void(0);" onclick="openResume()">Resume</a></li>
            <li><a href="{{ site.baseurl }}/contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main>
    {{ content }}
</main>

<footer>
    <p>© {{ site.year }} {{ site.author }}</p>
</footer>

<!-- Resume Modal -->
<div id="resume-overlay" class="modal">
    <span class="close" onclick="closeResume()">&times;</span>
    <iframe src="{{ '/assets/resume.pdf' | relative_url }}" height="100%" width="100%"></iframe>
</div>

<script>
    function openResume() {
        document.body.style.overflow = 'hidden'; // Disable scrolling on the body
        document.getElementById('resume-overlay').style.display = 'block';
    }

    function closeResume() {
        document.body.style.overflow = 'auto'; // Re-enable scrolling on the body
        document.getElementById('resume-overlay').style.display = 'none';
    }
</script>

</body>
</html>
