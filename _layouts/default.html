<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/custom.css' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>{{ site.title }}</h1>
        <nav>
            <ul>
                <li><a href="{{ '/' | relative_url }}">Home</a></li>
                <li><a href="#" id="resume-button" class="contact-button">Resume</a></li>
                <li><a href="#" id="contact-button" class="contact-button">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        {{ content }}
    </main>
    <footer>
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </footer>

    <!-- Contact Modal -->
    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Contact Me</h2>
            <ul>
                <li><a href="https://github.com/membaye" target="_blank" class="contact-button">GitHub</a></li>
                <li><a href="https://www.linkedin.com/in/matthewembaye/" target="_blank" class="contact-button">LinkedIn</a></li>
                <li>Email: <a href="mailto:membaye@uwaterloo.ca" class="contact-button">membaye@uwaterloo.ca</a></li>
            </ul>
        </div>
    </div>

    <!-- Resume Overlay -->
    <div id="resume-overlay" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <iframe src="{{ '/assets/resume.pdf' | relative_url }}" height="100%" width="100%"></iframe>
        </div>
    </div>

    <script>
        // JavaScript to handle the modals
        const contactButton = document.getElementById('contact-button');
        const contactModal = document.getElementById('contact-modal');
        const resumeButton = document.getElementById('resume-button');
        const resumeOverlay = document.getElementById('resume-overlay');
        const closeButtons = document.getElementsByClassName('close');

        contactButton.onclick = function() {
            contactModal.style.display = 'block';
        }

        resumeButton.onclick = function() {
            resumeOverlay.style.display = 'block';
        }

        for (let closeButton of closeButtons) {
            closeButton.onclick = function() {
                contactModal.style.display = 'none';
                resumeOverlay.style.display = 'none';
            }
        }

        window.onclick = function(event) {
            if (event.target == contactModal || event.target == resumeOverlay) {
                contactModal.style.display = 'none';
                resumeOverlay.style.display = 'none';
            }
        }
    </script>
</body>
</html>
